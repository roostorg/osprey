# Divine Osprey — local development stack
# Uses Kind cluster's ClickHouse and Funnelcake relay
#
# Setup (one-time):
#   1. Start Kind cluster with Funnelcake:
#        cd ~/code/divine-relay-test
#        bash scripts/setup-cluster.sh
#        bash scripts/relays/setup-funnelcake.sh
#      If the migration job times out, deploy manually:
#        kubectl apply -f k8s/funnelcake-deployment.yaml
#
#   2. Init ClickHouse schema (Kind's ClickHouse requires auth):
#        cd ~/code/osprey/divine
#        python3 -c "
#        import urllib.request, sys
#        sql = open('clickhouse-schema/001_osprey_events.sql').read()
#        for i, part in enumerate(sql.split('CREATE ')):
#            if i == 0: continue
#            stmt = 'CREATE ' + part.strip().rstrip(';')
#            req = urllib.request.Request(
#                'http://localhost:8123/?user=default&password=clickhouse',
#                data=stmt.encode())
#            try:
#                urllib.request.urlopen(req)
#                print(f'Statement {i}: OK')
#            except Exception as e:
#                print(f'Statement {i}: {e.read().decode()[:200] if hasattr(e,\"read\") else e}')
#        "
#
#   3. Start Osprey:
#        cd ~/code/osprey/divine
#        docker compose up -d
#
#   4. Seed test data:
#        bash scripts/seed-test-data.sh
#
# Enforcement test (optional):
#   Requires relay-manager running on Wrangler:
#     cd ~/code/divine-relay-manager/worker
#     # Add to .dev.vars: ADMIN_API_KEY=osprey-local-dev-key
#     npx wrangler dev --config wrangler.local.toml
#   Then set DIVINE_RELAY_MANAGER_URL and DIVINE_RELAY_MANAGER_API_KEY below
#   to match, and recreate the worker: docker compose up -d osprey-worker
#
# Verify:
#   docker compose logs osprey-worker --tail 20    # rule verdicts
#   curl -s 'http://localhost:8123/?user=default&password=clickhouse' \
#     --data 'SELECT Kind, __verdicts FROM osprey.osprey_events FORMAT Pretty'
#   http://localhost:5002                           # Osprey UI

volumes:
  metadata_data: {}

services:
  # ── Kafka (KRaft, no ZooKeeper) ──────────────────────────────────────
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: divine-kafka
    ports:
      - "127.0.0.1:9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:29093"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"
      KAFKA_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://kafka:29093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: "P45WxmmWSe2CrdGoeJMcKg"
    healthcheck:
      test: ["CMD", "bash", "-c", "kafka-topics --bootstrap-server kafka:29092 --list"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka-topic-creator:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      kafka:
        condition: service_healthy
    restart: "no"
    command: >
      bash -c "
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic nostr-events          --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic osprey.actions_input   --partitions 3 --replication-factor 1 &&
        kafka-topics --bootstrap-server kafka:29092 --create --if-not-exists --topic osprey.execution_results --partitions 3 --replication-factor 1 &&
        echo 'Topics created.' && kafka-topics --bootstrap-server kafka:29092 --list
      "

  # ── etcd ─────────────────────────────────────────────────────────────
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    hostname: etcd
    container_name: divine-etcd
    environment:
      ETCD_ADVERTISE_CLIENT_URLS: "http://etcd:2379"
      ETCD_LISTEN_CLIENT_URLS: "http://0.0.0.0:2379"
    ports:
      - "127.0.0.1:2379:2379"
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Postgres (labels service) ────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    hostname: postgres
    container_name: divine-postgres
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_USER: osprey
      POSTGRES_PASSWORD: FoolishPassword
      POSTGRES_DB: osprey
    volumes:
      - metadata_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U osprey -d osprey"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Osprey Coordinator ───────────────────────────────────────────────
  osprey-coordinator:
    build:
      context: ..
      dockerfile: osprey_coordinator/Dockerfile
    hostname: osprey-coordinator
    container_name: divine-coordinator
    depends_on:
      kafka:
        condition: service_healthy
      etcd:
        condition: service_healthy
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5003:5000"
    environment:
      - PYTHONPATH=/osprey
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - ETCD_HOST=etcd
      - ETCD_PORT=2379
      - POD_IP=osprey-coordinator
      - POSTGRES_HOSTS={"osprey_db":"postgresql://osprey:FoolishPassword@postgres:5432/osprey"}

  # ── Osprey Worker (Divine variant) ───────────────────────────────────
  osprey-worker:
    build:
      context: ..
      dockerfile: divine/Dockerfile.worker
    hostname: osprey-worker
    container_name: divine-worker
    command: ["osprey-worker"]
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topic-creator:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:5011:5000"
    environment:
      - PYTHONPATH=/osprey/osprey_worker/src:/osprey/osprey_rpc/src:/osprey/divine_plugins/src:/osprey
      - PORT=5000
      - POSTGRES_HOSTS={"osprey_db":"postgresql://osprey:FoolishPassword@postgres:5432/osprey"}
      - OSPREY_INPUT_STREAM_SOURCE=kafka
      - OSPREY_STDOUT_OUTPUT_SINK=True
      - OSPREY_KAFKA_BOOTSTRAP_SERVERS=["kafka:29092"]
      - OSPREY_KAFKA_INPUT_STREAM_TOPIC=osprey.actions_input
      - OSPREY_KAFKA_INPUT_STREAM_CLIENT_ID=divine-worker
      - OSPREY_KAFKA_OUTPUT_SINK=True
      - OSPREY_KAFKA_OUTPUT_TOPIC=osprey.execution_results
      - OSPREY_KAFKA_OUTPUT_CLIENT_ID=divine-worker
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      # ClickHouse output — uses Kind cluster's ClickHouse on host
      - OSPREY_CLICKHOUSE_OUTPUT_SINK=true
      - OSPREY_CLICKHOUSE_HOST=host.docker.internal
      - OSPREY_CLICKHOUSE_PORT=8123
      - OSPREY_CLICKHOUSE_DATABASE=osprey
      - OSPREY_CLICKHOUSE_TABLE=osprey_events
      - OSPREY_CLICKHOUSE_USER=default
      - OSPREY_CLICKHOUSE_PASSWORD=clickhouse
      - OSPREY_CLICKHOUSE_BATCH_SIZE=5
      # Plugins & rules
      - OSPREY_PLUGIN_PATH=/osprey/divine_plugins/src
      - OSPREY_RULES_PATH=/osprey/divine_rules
      - DIVINE_RELAY_MANAGER_URL=http://host.docker.internal:8787
      - DIVINE_RELAY_MANAGER_API_KEY=osprey-local-dev-key
      - DIVINE_MODERATION_API_URL=https://moderation-api.divine.video
      - OSPREY_RULES_SINK_NUM_WORKERS=1
      - SNOWFLAKE_API_ENDPOINT=http://snowflake-id-worker:8088
      - DD_TRACE_ENABLED=False
      - DD_DOGSTATSD_DISABLE=True

  # ── Snowflake ID Worker ──────────────────────────────────────────────
  snowflake-id-worker:
    hostname: snowflake-id-worker
    container_name: divine-snowflake
    image: ghcr.io/ayubun/snowflake-id-worker:0
    ports:
      - "127.0.0.1:8088:8088"
    environment:
      - WORKER_ID=0
      - DATA_CENTER_ID=0
      - EPOCH=1420070400000
      - PORT=8088
    restart: unless-stopped

  # ── Osprey UI API ────────────────────────────────────────────────────
  osprey-ui-api:
    build:
      context: ..
      dockerfile: divine/Dockerfile.worker
    hostname: osprey-ui-api
    container_name: divine-ui-api
    command: ["osprey-ui-api"]
    depends_on:
      - osprey-worker
      - postgres
    ports:
      - "127.0.0.1:5004:5004"
    environment:
      - PYTHONPATH=/osprey/osprey_worker/src:/osprey/osprey_rpc/src:/osprey/divine_plugins/src:/osprey
      - PORT=5004
      - DEBUG=true
      - FLASK_DEBUG=1
      - FLASK_ENV=development
      - POSTGRES_HOSTS={"osprey_db":"postgresql://osprey:FoolishPassword@postgres:5432/osprey"}
      - DD_TRACE_ENABLED=False
      - DD_DOGSTATSD_DISABLE=True
      - OSPREY_RULES_PATH=/osprey/divine_rules
      - OSPREY_DISABLE_VALIDATION_EXPORTER=true
      - SNOWFLAKE_API_ENDPOINT=http://snowflake-id-worker:8088
      - SNOWFLAKE_EPOCH=1420070400000
      # ClickHouse — uses Kind cluster's ClickHouse on host
      - CLICKHOUSE_HOST=host.docker.internal
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_DATABASE=osprey
      - CLICKHOUSE_TABLE=osprey_events
      - CLICKHOUSE_USER=default
      - CLICKHOUSE_PASSWORD=clickhouse

  # ── Osprey UI ────────────────────────────────────────────────────────
  osprey-ui:
    build:
      context: ..
      dockerfile: osprey_ui/Dockerfile
    hostname: osprey-ui
    container_name: divine-ui
    depends_on:
      - osprey-worker
    ports:
      - "127.0.0.1:5002:5002"
    environment:
      - NODE_ENV=development
      - REACT_APP_API_BASE_URL=http://localhost:5004

  # ── Nostr → Kafka Bridge ────────────────────────────────────────────
  nostr-kafka-bridge:
    build:
      context: ./nostr-kafka-bridge
    hostname: nostr-kafka-bridge
    container_name: divine-bridge
    depends_on:
      kafka:
        condition: service_healthy
      kafka-topic-creator:
        condition: service_completed_successfully
    environment:
      # Connects to local Funnelcake relay via Kind cluster
      - RELAY_URL=${RELAY_URL:-ws://host.docker.internal:4444}
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - KAFKA_TOPIC=osprey.actions_input
    restart: unless-stopped
