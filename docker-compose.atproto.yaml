# Override that swaps the synthetic Kafka producer for the live Bluesky JetStream
# firehose, via the example_atproto_plugins package. Stack on top of the main
# compose file:
#
#   docker compose -f docker-compose.yaml -f docker-compose.atproto.yaml up
#
# Or use the convenience wrapper: ./run-atproto.sh
services:
  osprey-worker:
    environment:
      OSPREY_INPUT_STREAM_SOURCE: plugin
      OSPREY_RULES_PATH: /osprey/example_atproto_rules
      # Opt-in: set to the workshop label relay to forward benign bleep/bloop
      # labels from rules to the real Ozone labeler. Unset = internal labels only.
      OZONE_RELAY_URL: ${OZONE_RELAY_URL:-}
      # Bearer token for the relay (must match its RELAY_TOKEN); needed for a
      # deployed/token-authed relay, unset for a local open one.
      OZONE_RELAY_TOKEN: ${OZONE_RELAY_TOKEN:-}
    volumes:
      - ./example_atproto_rules:/osprey/example_atproto_rules
      - ./example_atproto_plugins:/osprey/example_atproto_plugins

  osprey-ui-api:
    environment:
      OSPREY_RULES_PATH: /osprey/example_atproto_rules
      # Where the in-app rule editor's "deploy" writes SML (#402). Same mounted
      # dir the worker loads, so a deployed draft is picked up on worker restart.
      OSPREY_RULES_LOCAL_PATH: /osprey/example_atproto_rules
    volumes:
      - ./example_atproto_rules:/osprey/example_atproto_rules
