name: osprey-test

# Test-specific docker-compose that extends the main one
# Usage: docker compose -f docker-compose.yaml -f docker-compose.test.yaml --profile test <command>

services:
  osprey-kafka:
    container_name: osprey-test-kafka
    ports: !reset []

  clickhouse:
    container_name: osprey-test-clickhouse
    ports: !reset []

  osprey-worker:
    container_name: osprey-test-worker
    ports: !reset []

  osprey-ui-api:
    container_name: osprey-test-ui-api
    ports: !reset []

  osprey-ui:
    container_name: osprey-test-ui
    ports: !reset []

  osprey-kafka-test-data-producer:
    container_name: osprey-test-kafka-test-data-producer

  postgres:
    container_name: osprey-test-postgres
    ports: !reset []
    volumes: !reset []

  minio:
    container_name: osprey-test-minio
    ports: !reset []
    volumes: !reset []

  etcd:
    container_name: osprey-test-etcd
    image: quay.io/coreos/etcd:v3.4.18
    ports: !reset []
    environment:
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_PEER_URLS=http://0.0.0.0:2380
      - ETCD_INITIAL_ADVERTISE_PEER_URLS=http://etcd:2380
      - ETCD_INITIAL_CLUSTER=etcd=http://etcd:2380
      - ETCD_NAME=etcd
      - ETCD_DATA_DIR=/etcd-data
      - ETCD_ENABLE_V2=true
    healthcheck:
      test:
        [
          "CMD",
          "etcdctl",
          "--endpoints=http://localhost:2379",
          "endpoint",
          "health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  bigtable:
    container_name: osprey-test-bigtable
    profiles: !override
      - bigtable
    ports: !reset []

  bigtable-initializer:
    container_name: osprey-test-bigtable-initializer
    profiles: !override
      - bigtable

  snowflake-id-worker:
    container_name: osprey-test-snowflake-id-worker
    ports: !reset []

  druid-zookeeper:
    container_name: osprey-test-druid-zookeeper
    ports: !reset []

  druid-coordinator:
    container_name: osprey-test-druid-coordinator
    ports: !reset []

  druid-broker:
    container_name: osprey-test-druid-broker
    ports: !reset []

  druid-historical:
    container_name: osprey-test-druid-historical
    ports: !reset []

  druid-middlemanager:
    container_name: osprey-test-druid-middlemanager
    ports: !reset []

  druid-router:
    container_name: osprey-test-druid-router
    ports: !reset []

  druid-spec-submitter:
    container_name: osprey-test-druid-spec-submitter

  test_runner:
    container_name: osprey-test-runner
    build:
      context: .
      dockerfile: osprey_worker/Dockerfile
    depends_on:
      osprey-kafka:
        condition: service_healthy
      osprey-kafka-topic-creator:
        condition: service_completed_successfully
      minio:
        condition: service_healthy
      minio-bucket-init:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      snowflake-id-worker:
        condition: service_started
      etcd:
        condition: service_healthy
    profiles:
      - test
    environment:
      - PYTHONPATH=/osprey
      - OSPREY_INPUT_STREAM_SOURCE=kafka
      - OSPREY_STDOUT_OUTPUT_SINK=True
      - OSPREY_KAFKA_BOOTSTRAP_SERVERS=["osprey-kafka:29092"]
      - OSPREY_KAFKA_INPUT_STREAM_TOPIC=osprey.actions_input
      - OSPREY_KAFKA_INPUT_STREAM_CLIENT_ID=localhost
      - OSPREY_KAFKA_OUTPUT_SINK=True
      - OSPREY_KAFKA_OUTPUT_TOPIC=osprey.execution_results
      - OSPREY_KAFKA_OUTPUT_CLIENT_ID=localhost
      - DD_TRACE_ENABLED=False
      - DD_DOGSTATSD_DISABLE=True
      - OSPREY_RULES_SINK_NUM_WORKERS=1
      - OSPREY_EXECUTION_RESULT_STORAGE_BACKEND=minio
      - OSPREY_MINIO_ENDPOINT=minio:9000
      - OSPREY_MINIO_ACCESS_KEY=minioadmin
      - OSPREY_MINIO_SECRET_KEY=minioadmin123
      - OSPREY_MINIO_SECURE=false
      - OSPREY_MINIO_EXECUTION_RESULTS_BUCKET=execution-output
      - SNOWFLAKE_API_ENDPOINT=http://snowflake-id-worker:8088
      - SNOWFLAKE_EPOCH=1420070400000
      - OSPREY_RULES_PATH=./example_rules
      - OSPREY_DISABLE_VALIDATION_EXPORTER=true
      - OSPREY_DISABLE_ANALYTICS_PUBLISHER=true
      - DRUID_URL=http://druid-broker:8082
      - RUN_DRUID_INTEGRATION_TESTS=false
      - POSTGRES_HOSTS={"osprey_db":"postgresql://osprey:FoolishPassword@postgres:5432/osprey"}
      - ETCD_PEERS=http://etcd:2379
      - TESTING=true
    volumes:
      - ./osprey_worker:/osprey/osprey_worker
      - ./osprey_rpc:/osprey/osprey_rpc
      - ./example_rules:/osprey/example_rules
      - ./entrypoint.sh:/osprey/entrypoint.sh
      - /tmp/test-results:/tmp/test-results
    command: ["run-tests"]
