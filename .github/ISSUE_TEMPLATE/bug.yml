name: Bug report
description: Create a report to help us improve
type: bug
body:
  - type: markdown
    attributes:
      value: >
        Thanks for taking the time to report a bug in Osprey! **Please
        provide as much detail as you can** so we can properly confirm,
        triage, and ultimately fix your bug.

  - type: textarea
    id: description
    attributes:
      label: Problem description
      description: A clear and concise description of what the bug is.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: To reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: A clear and concise description of what you expected to happen.
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: e.g. macOS 14, Ubuntu 22.04
    validations:
      required: false

  - type: dropdown
    id: browsers
    attributes:
      label: Affected browser(s)
      description: >
        Which browser(s) are you seeing the problem in? Leave blank if it's
        not a front-end issue. If an affected browser is not included in this
        list, mention it below.
      multiple: true
      options:
        - Chrome
        - Firefox
        - Microsoft Edge
        - Safari

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots/recordings/logs
      description: If applicable, add screenshots or logs to help explain your problem.
    validations:
      required: false

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Add any other context about the problem here.
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      description: >
        Make sure you've completed each step and reviewed the
        [Code of Conduct](https://github.com/roostorg/.github/blob/main/CODE_OF_CONDUCT.md)
        before submitting.
      options:
        - label: I've reviewed and agree to follow the code of conduct
          required: true
