name: Release osprey-rpc

on:
  release:
    types: [published]

jobs:
  build-osprey-rpc:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78  # v7.6.0
        with:
          version: "latest"

      - name: Build osprey-rpc sdist
        working-directory: osprey_rpc
        run: uv build --sdist

      - name: Create zip from sdist
        working-directory: osprey_rpc/dist
        run: |
          tar -xzf osprey_rpc-*.tar.gz
          SDIST_DIR=$(ls -d osprey_rpc-*/)
          SDIST_DIR=${SDIST_DIR%/}
          zip -r "${SDIST_DIR}.zip" "${SDIST_DIR}"
          rm -rf "${SDIST_DIR}"
          ls -la

      - name: Upload osprey-rpc to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65  # v2.6.2
        with:
          files: |
            osprey_rpc/dist/osprey_rpc-*.tar.gz
            osprey_rpc/dist/osprey_rpc-*.zip
