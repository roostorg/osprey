name: Release osprey-rpc

on:
  release:
    types: [published]

jobs:
  build-osprey-rpc:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990  # v8.3.2
        with:
          version: "latest"
          enable-cache: false

      - name: Build osprey-rpc sdist
        working-directory: osprey_rpc
        run: uv build --sdist

      - name: Create zip from sdist
        working-directory: osprey_rpc/dist
        run: |
          tar -xzf osprey_rpc-*.tar.gz
          SDIST_DIR=$(ls -d osprey_rpc-*/)
          SDIST_DIR=${SDIST_DIR%/}
          zip -r "${SDIST_DIR}.zip" "${SDIST_DIR}"
          rm -rf "${SDIST_DIR}"
          ls -la

      - name: Upload osprey-rpc to release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ github.event.release.tag_name }}
        run: |
          gh release upload "$TAG" \
            osprey_rpc/dist/osprey_rpc-*.tar.gz \
            osprey_rpc/dist/osprey_rpc-*.zip
