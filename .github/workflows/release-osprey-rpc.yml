name: Release osprey-rpc

on:
  release:
    types: [published]

jobs:
  build-osprey-rpc:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version-file: ".python-version"

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          version: "latest"

      - name: Build osprey-rpc sdist
        working-directory: osprey_rpc
        run: uv build --sdist

      - name: Create zip from sdist
        working-directory: osprey_rpc/dist
        run: |
          tar -xzf osprey_rpc-*.tar.gz
          SDIST_DIR=$(ls -d osprey_rpc-*/)
          SDIST_DIR=${SDIST_DIR%/}
          zip -r "${SDIST_DIR}.zip" "${SDIST_DIR}"
          rm -rf "${SDIST_DIR}"
          ls -la

      - name: Upload osprey-rpc to release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          files: |
            osprey_rpc/dist/osprey_rpc-*.tar.gz
            osprey_rpc/dist/osprey_rpc-*.zip
